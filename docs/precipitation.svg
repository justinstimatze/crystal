<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="470" fill="#ffffff"/>

  <!-- title + honesty subtitle -->
  <text x="40" y="28" font-size="16" font-weight="bold" fill="#1a1a1a">precipitation — one chore falling out of the frontier, over time</text>
  <text x="40" y="46" font-size="10.5" fill="#5a5a5a" font-style="italic">schematic of the intended lifecycle — not a measured trace</text>

  <!-- faint tier guides -->
  <line x1="108" y1="100" x2="690" y2="100" stroke="#dcdcdc" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="108" y1="170" x2="690" y2="170" stroke="#dcdcdc" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="108" y1="250" x2="690" y2="250" stroke="#dcdcdc" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="108" y1="340" x2="690" y2="340" stroke="#dcdcdc" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- axes -->
  <line x1="108" y1="78" x2="108" y2="388" stroke="#bbbbbb" stroke-width="1.5"/>
  <line x1="108" y1="388" x2="700" y2="388" stroke="#bbbbbb" stroke-width="1.5"/>

  <!-- y-axis: executor tiers (labels OUTSIDE, left) -->
  <text x="100" y="104" font-size="11" fill="#444" text-anchor="end">Opus</text>
  <text x="100" y="174" font-size="11" fill="#444" text-anchor="end">Haiku</text>
  <text x="100" y="254" font-size="11" fill="#444" text-anchor="end">local model</text>
  <text x="100" y="344" font-size="11" fill="#444" text-anchor="end">code</text>

  <!-- x-axis -->
  <text x="404" y="436" font-size="12.5" font-weight="bold" fill="#333" text-anchor="middle">recurrences of the same chore, over time →</text>
  <text x="116" y="406" font-size="9.5" fill="#5a5a5a">1st use</text>
  <text x="688" y="406" font-size="9.5" fill="#5a5a5a" text-anchor="end">settled</text>

  <!-- drop connectors (gated step down a tier); dashed once we cross into roadmap tiers -->
  <line x1="200" y1="100" x2="200" y2="160" stroke="#aaaaaa" stroke-width="1.5"/>
  <polygon points="200,164 196,154 204,154" fill="#aaaaaa"/>
  <line x1="330" y1="170" x2="330" y2="240" stroke="#aaaaaa" stroke-width="1.5"/>
  <polygon points="330,244 326,234 334,234" fill="#aaaaaa"/>
  <line x1="525" y1="170" x2="525" y2="330" stroke="#aaaaaa" stroke-width="1.5"/>
  <polygon points="525,334 521,324 529,324" fill="#aaaaaa"/>

  <!-- drift connector (reddish-purple, distinct from any openness color): demote + re-author -->
  <line x1="460" y1="240" x2="460" y2="168" stroke="#CC79A7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="460,162 456,172 464,172" fill="#CC79A7"/>

  <!-- residency bars (colored by OPENNESS, Okabe–Ito; dashed = roadmap tier) -->
  <line x1="110" y1="100" x2="200" y2="100" stroke="#D55E00" stroke-width="7" stroke-linecap="round"/>
  <line x1="200" y1="170" x2="330" y2="170" stroke="#D55E00" stroke-width="7" stroke-linecap="round"/>
  <line x1="330" y1="250" x2="460" y2="250" stroke="#E69F00" stroke-width="7" stroke-linecap="round"/>
  <line x1="460" y1="170" x2="525" y2="170" stroke="#D55E00" stroke-width="7" stroke-linecap="round"/>
  <line x1="525" y1="340" x2="688" y2="340" stroke="#0072B2" stroke-width="7" stroke-linecap="round"/>

  <!-- gate / drift markers (mechanism — neutral, not an openness color) -->
  <text x="206" y="146" font-size="9.5" fill="#555555">gate ✓</text>
  <text x="336" y="226" font-size="9.5" fill="#555555">gate ✓</text>
  <text x="531" y="316" font-size="9.5" fill="#555555">gate ✓</text>

  <!-- chemistry-stage annotations (start / end STATES, not per-step) -->
  <text x="112" y="88" font-size="10" fill="#5a5a5a" font-style="italic">supersaturated · held at the frontier while samples accrue</text>
  <text x="392" y="150" font-size="10" fill="#CC79A7" text-anchor="end">drift → demote + re-author</text>
  <text x="531" y="333" font-size="10" fill="#0072B2">precipitated · runs as code, no model call</text>

  <!-- compact openness key (so the chart is self-contained) -->
  <text x="600" y="92" font-size="10" font-weight="bold" fill="#333">color = openness</text>
  <rect x="600" y="100" width="11" height="11" fill="#D55E00"/>
  <text x="616" y="109" font-size="10" fill="#333">proprietary</text>
  <rect x="600" y="118" width="11" height="11" fill="#E69F00"/>
  <text x="616" y="127" font-size="10" fill="#333">open-weight</text>
  <rect x="600" y="136" width="11" height="11" fill="#0072B2"/>
  <text x="616" y="145" font-size="10" fill="#333">just code</text>
</svg>
